<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notenerfassung_V2_Diskret</title>
    <style>
        body { font-family: sans-serif; margin: 10px; background-color: #f0f2f5; }
        .container { max-width: 500px; margin: auto; background: white; padding: 15px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        
        .header-info { display: flex; justify-content: space-between; margin-bottom: 10px; font-size: 0.8rem; color: #555; }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 15px; font-size: 1.2rem; }
        
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th, td { padding: 6px 8px; border: 1px solid #ccc; text-align: left; }
        
        th { background-color: #eee; }
        
        .col-selbst { background-color: #e3f2fd; width: 80px; text-align: center; } 
        .col-lehrer { background-color: #fff9c4; width: 80px; text-align: center; } 
        
        select { padding: 3px; border-radius: 3px; border: 1px solid #999; font-size: 0.85rem; cursor: pointer; background: white; width: 100%; }
        
        .btn-print { 
            display: block; width: 100%; padding: 12px; background: #27ae60; color: white; 
            border: none; border-radius: 5px; cursor: pointer; font-size: 1rem; margin-top: 15px;
            font-weight: bold;
        }

        /* PDF / DRUCK OPTIMIERUNG */
        @media print {
            @page { size: portrait; margin: 1cm; }
            body { background: white; margin: 0; }
            .container { box-shadow: none; width: 100%; max-width: none; border: none; padding: 0; }
            .btn-print { display: none; }
            
            /* Verhindert, dass Dropdowns im PDF wie graue Boxen aussehen */
            select { 
                border: none; 
                appearance: none; 
                -webkit-appearance: none; 
                background: transparent; 
                font-weight: bold; 
                text-align: center;
            }
            .col-selbst { background-color: #f8f9fa !important; -webkit-print-color-adjust: exact; }
            .col-lehrer { background-color: #f1f1f1 !important; -webkit-print-color-adjust: exact; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header-info">
        <span>Klasse: ________</span>
        <span id="datum"></span>
    </div>
    <h2>Notenabgleich (Anonymisiert)</h2>
    
    <table>
        <thead>
            <tr>
                <th>Schüler</th>
                <th style="font-size: 0.7rem; text-align: center;">Selbst</th>
                <th style="font-size: 0.7rem; text-align: center;">Lehrer</th>
            </tr>
        </thead>
        <tbody id="schuelerListe">
            </tbody>
    </table>

    <button class="btn-print" onclick="window.print()">Als PDF speichern / Drucken</button>
</div>

<script>
    // Automatisches Datum setzen
    document.getElementById('datum').textContent = "Datum: " + new Date().toLocaleDateString('de-DE');

    // Gekürzte Namen
    const schueler = [
        "Ben Al.", "Fabian Bä.", "Ivan Ba.", "Berfin Bu.", 
        "Hannah Bu.", "Eymen Ch.", "Jesko Ka.", 
        "Afroditi La.", "Julian Li.", "Arin Na.", 
        "Hila Or.", "Iliana Pe.", "Hendrik Pl.", 
        "Eliana Ro.", "Marlon Se.", "Yukta Si.", 
        "Luis Sn.", "Mani So.", "Rania Ug.", "Axîn Yi."
    ];

    const notenOptionen = ["1+", "1", "1-", "2+", "2", "2-", "3+", "3", "3-", "4+", "4", "4-", "5", "6"];
    const standardNote = "2-";

    const liste = document.getElementById('schuelerListe');

    schueler.forEach(name => {
        let row = document.createElement('tr');
        
        let tdName = document.createElement('td');
        tdName.textContent = name;
        row.appendChild(tdName);

        const createSelect = (className) => {
            let td = document.createElement('td');
            td.className = className;
            let sel = document.createElement('select');
            notenOptionen.forEach(n => {
                let opt = document.createElement('option');
                opt.value = n; opt.textContent = n;
                if (n === standardNote) opt.selected = true;
                sel.appendChild(opt);
            });
            td.appendChild(sel);
            return td;
        };

        row.appendChild(createSelect('col-selbst'));
        row.appendChild(createSelect('col-lehrer'));
        liste.appendChild(row);
    });
</script>

</body>
</html>
